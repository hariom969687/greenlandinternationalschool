<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Admission | Greenland International School</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.header{
background:#ffffff;
display:flex;
align-items:center;
padding:15px 40px;
border-bottom:3px solid #b9411c;
}

.header img{
width:70px;
margin-right:15px;
}

.school-name h1{
margin:0;
color:#b9411c;
font-size:26px;
}

.school-name p{
margin:0;
color:#555;
}

/* FORM */

.container{
max-width:1100px;
margin:40px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.section-title{
background:#eef3f8;
padding:10px;
margin-top:30px;
border-left:4px solid #1e73be;
font-weight:bold;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:4px;
width:100%;
}

.full{
grid-column:1/3;
}

button{
margin-top:30px;
background:#b9411c;
color:white;
border:none;
padding:14px;
font-size:16px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#922f15;
}

</style>
</head>

<body>


<!-- HEADER -->

<div class="header">

<img src="C:\Users\MindTech Gyaan\Desktop\Gemini\logo.jpeg">

<div class="school-name">
<h1>GREENLAND INTERNATIONAL SCHOOL</h1>
<p>A Hybrid, Affiliated English Medium C.B.S.E School</p>
</div>

</div>


<div class="container">

<h2>Student Admission Form</h2>


<div class="section-title">Student Details</div>

<div class="form-grid">

<input type="text" placeholder="Student Name">

<select>
<option>Select Class</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="date">

<input type="text" placeholder="Mobile">

<input type="text" placeholder="Alternate Number">

<select>
<option>Select Category</option>
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
</select>

<input type="text" placeholder="Religion / Cast">

<input type="text" placeholder="Roll Number">

<input type="text" placeholder="Enrollment Number">

<input type="email" placeholder="Email">

<input type="text" placeholder="Previous School">

<input type="text" placeholder="Aadhar Number">

<input type="number" placeholder="Discount">

</div>


<div class="section-title">Medical Details</div>

<div class="form-grid">

<input type="text" placeholder="Height">

<input type="text" placeholder="Weight">

<input type="text" placeholder="Blood Group">

<input type="text" placeholder="Medical Problem">

</div>


<div class="section-title">Guardian Details</div>

<div class="form-grid">

<input type="text" placeholder="Father Name">

<input type="text" placeholder="Father Qualification">

<input type="text" placeholder="Mother Name">

<input type="text" placeholder="Mother Qualification">

<input type="text" placeholder="Guardian Name">

<input type="text" placeholder="Guardian Qualification">

</div>


<div class="section-title">Current Address</div>

<div class="form-grid">

<input class="full" type="text" placeholder="Address">

<input type="text" placeholder="City">

<select>
<option>Select State</option>
<option>Uttar Pradesh</option>
<option>Bihar</option>
<option>Delhi</option>
</select>

<input type="text" placeholder="PIN">

</div>


<div class="section-title">Permanent Address</div>

<div class="form-grid">

<input class="full" type="text" placeholder="Address">

<input type="text" placeholder="City">

<select>
<option>Select State</option>
<option>Uttar Pradesh</option>
<option>Bihar</option>
<option>Delhi</option>
</select>

<input type="text" placeholder="PIN">

</div>


<button type="submit">Submit Admission Form</button>

</div>

</body>
</html>
